name: Update modules index

on:
  push:
    paths:
      - 'modules/**/config.ini'
      - 'modules/**/lang/**/desc.ini'
      - 'modules/**/*.png'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run indexer
        run: python update_modules_json.py

      - name: Commit updated modules.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add modules/modules.json
          git diff --cached --quiet || git commit -m "chore: update modules.json [skip ci]"
          git push
